<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salut 👋</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 32px 24px;
  }

  .card {
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  .emoji {
    font-size: 3.5rem;
    margin-bottom: 28px;
    display: block;
  }

  .message {
    font-size: 1.25rem;
    font-weight: 400;
    line-height: 1.8;
    color: #e0e0e0;
    margin-bottom: 40px;
  }

  .message strong {
    color: #fff;
    font-weight: 700;
  }

  .ig-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #fff;
    color: #000;
    text-decoration: none;
    font-weight: 900;
    font-size: 1rem;
    letter-spacing: 0.05em;
    padding: 16px 32px;
    border-radius: 50px;
    transition: opacity 0.2s;
  }

  .ig-btn:hover { opacity: 0.85; }

  .ig-icon {
    width: 22px;
    height: 22px;
  }
</style>
</head>
<body>
<div class="card">
  <span class="emoji">👋</span>
  <p class="message">
    Salut, je suis <strong>Julien</strong> — célibataire, hétéro,
    sportif et parfois alcoolique.<br><br>
    Aborde moi, qu'on en discute.
  </p>
  <a class="ig-btn" href="https://instagram.com/julienpyd" target="_blank">
    <svg class="ig-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="2" width="20" height="20" rx="5" stroke="black" stroke-width="2"/>
      <circle cx="12" cy="12" r="4" stroke="black" stroke-width="2"/>
      <circle cx="17.5" cy="6.5" r="1" fill="black"/>
    </svg>
    @julienpyd
  </a>
</div>
</body>
</html>
